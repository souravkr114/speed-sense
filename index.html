<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Sense - Real-time Object Speed Tracker</title>
    <!-- Fonts: Inter for UI, Orbitron for Speed HUD -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 1. SIDEBAR PANEL -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">⚡</div>
                <div class="brand-text">
                    <h1>SPEED SENSE</h1>
                    <p>Browser Speed Estimator</p>
                </div>
            </div>

            <!-- Panel Section: Source Control -->
            <div class="control-card">
                <h3>1. Source Control</h3>
                <div class="btn-group">
                    <button id="btnWebcam" class="btn btn-primary">📷 Start Camera</button>
                    <button id="btnUpload" class="btn btn-secondary">📁 Upload Video
                        <input type="file" id="videoFile" accept="video/*" style="display: none;">
                    </button>
                </div>
                <div class="camera-select-wrapper" style="display: none;" id="cameraSelectContainer">
                    <label for="cameraSelect">Select Device:</label>
                    <select id="cameraSelect" class="dropdown"></select>
                </div>
            </div>

            <!-- Panel Section: Calibration -->
            <div class="control-card">
                <h3>2. Calibration</h3>
                <button id="btnCalib" class="btn btn-accent">📏 Draw Calibration Line</button>
                <div class="input-inline">
                    <input type="number" id="calibDistance" value="1.0" min="0.01" step="0.1">
                    <span>meters</span>
                </div>
                <div class="calib-status">
                    <span>Status:</span>
                    <span id="calibStatus" class="badge badge-warning">Default Scale (5mm/px)</span>
                </div>
            </div>

            <!-- Panel Section: Tracker Config -->
            <div class="control-card">
                <h3>3. Tracking Settings</h3>
                <div class="input-group">
                    <label for="trackerType">Tracking Mode:</label>
                    <select id="trackerType" class="dropdown">
                        <option value="Color">Color (Double-click target)</option>
                        <option value="Box">Box (Double-click to drag box)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="speedUnit">Speed Unit:</label>
                    <select id="speedUnit" class="dropdown">
                        <option value="km/h">km/h</option>
                        <option value="mph">mph</option>
                        <option value="m/s">m/s</option>
                    </select>
                </div>
                <div class="input-group">
                    <div class="slider-header">
                        <label for="sliderSmooth">Smoothing Factor:</label>
                        <span id="smoothVal">0.20</span>
                    </div>
                    <input type="range" id="sliderSmooth" min="0.01" max="0.95" step="0.01" value="0.20" class="slider">
                </div>
                <button id="btnReset" class="btn btn-danger">🔄 Reset Stats & Trail</button>
            </div>
        </aside>

        <!-- 2. MAIN WORKSPACE AREA -->
        <main class="main-content">
            <!-- Top HUD Metrics Bar -->
            <header class="hud-bar">
                <div class="hud-item speed-hud">
                    <span class="hud-label">CURRENT SPEED</span>
                    <span id="valSpeed" class="hud-value hud-green">0.0</span>
                    <span id="lblUnit1" class="hud-unit">km/h</span>
                </div>
                <div class="hud-item max-speed-hud">
                    <span class="hud-label">MAX RECORDED</span>
                    <span id="valMaxSpeed" class="hud-value hud-red">0.0</span>
                    <span id="lblUnit2" class="hud-unit">km/h</span>
                </div>
                <div class="hud-item scale-hud">
                    <span class="hud-label">SCALE RATIO</span>
                    <span id="valScale" class="hud-value hud-yellow">200.0</span>
                    <span class="hud-unit">px/m</span>
                </div>
            </header>

            <!-- Video Player Workspace -->
            <div class="player-container">
                <!-- Dropzone Overlay -->
                <div id="dropZone" class="drop-zone">
                    <div class="drop-icon">📤</div>
                    <p>Drag & Drop Video File Here to Load</p>
                </div>

                <div class="canvas-wrapper">
                    <!-- Main Tracking Canvas -->
                    <canvas id="videoCanvas"></canvas>
                </div>

                <!-- Hidden video tag for streaming source -->
                <video id="sourceVideo" style="display: none;" playsinline loop muted></video>

                <!-- Playback Timeline / Controls -->
                <div class="playback-controls">
                    <button id="btnPlayPause" class="btn-play">▶ Play</button>
                    <button id="btnStepFrame" class="btn-control">Step ⏭</button>
                    <div class="timeline-container">
                        <span id="timeCurrent" class="time-label">00:00</span>
                        <input type="range" id="sliderTimeline" min="0" max="100" value="0" class="slider-timeline" disabled>
                        <span id="timeTotal" class="time-label">00:00</span>
                    </div>
                </div>
            </div>

            <!-- Telemetry Chart -->
            <footer class="telemetry-panel">
                <div class="chart-header">
                    <h4>📊 Telemetry History (Speed vs Time)</h4>
                </div>
                <div class="chart-wrapper">
                    <canvas id="graphCanvas"></canvas>
                </div>
            </footer>
        </main>
    </div>

    <script src="tracker.js"></script>
</body>
</html>
